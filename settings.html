
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings | Coderoller</title>
  <link rel="stylesheet" href="/src/style.css">
  <script type="module" src="/src/polyfills.js"></script>
</head>
<body class="bg-gray-950 flex font-sans">
  
<div class="w-72 bg-gray-950 border-r border-gray-900 hidden md:flex flex-col flex-shrink-0 min-h-screen">
  <div class="p-6 border-b border-gray-900">
    <p id="sidebar_username" class="font-bold text-white">prabhav chakka</p>
  </div>
  <div class="p-4 flex-grow">
    <ul class="space-y-2 mb-8">
      <li><a href="/dashboard.html" class="block px-4 py-3 text-gray-400 hover:text-white">Overview</a></li>
      <li><a href="/analytics.html" class="block px-4 py-3 text-gray-400 hover:text-white">Deep Analytics</a></li>
    </ul>
    <ul class="space-y-2">
      <li><a href="/profile.html" class="block px-4 py-3 text-gray-400 hover:text-white">My Profile</a></li>
      <li><a href="/settings.html" class="block px-4 py-3 text-gray-400 hover:text-white">Settings</a></li>
    </ul>
  </div>
</div>

  <div class="flex-grow p-8 max-w-5xl mx-auto h-screen overflow-y-auto">
    <h1 class="text-3xl font-black text-white mb-8">Settings</h1>
    <button id="notify-btn" class="px-5 py-2.5 bg-gray-800 text-white rounded">Toggle Notifications</button>
  </div>
  <script>
    document.getElementById('sidebar_username').innerText = localStorage.getItem('username') || 'prabhav chakka';
    window.globalUserTheme = 'dark-pro';
    
    let notifications = true;
    const toggleNotifications = function() {
      this.notifications = !this.notifications;
      console.log(this.notifications);
    };
    
    document.getElementById('notify-btn').addEventListener('click', toggleNotifications);
  </script>

<button id="back-to-top" aria-label="Back to top" class="hidden fixed bottom-6 right-6 z-[100] items-center justify-center w-11 h-11 rounded-full bg-gray-900 border border-gray-800 text-green-400 shadow-xl hover:bg-gray-800 transition">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>
<script>
  (function () {
    var backToTopBtn = document.getElementById('back-to-top');
    if (!backToTopBtn) return;
    window.addEventListener('scroll', function () {
      if (window.scrollY > 300) {
        backToTopBtn.classList.remove('hidden');
        backToTopBtn.classList.add('flex');
      } else {
        backToTopBtn.classList.add('hidden');
        backToTopBtn.classList.remove('flex');
      }
    });
    backToTopBtn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
</script>
</body>
</html>
